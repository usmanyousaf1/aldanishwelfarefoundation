<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Danish Welfare Foundation</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pr:#B91C1C;--pr-d:#7F1D1D;--pr-l:#DC2626;
  --ac:#B45309;--ac-l:#F59E0B;
  --dk:#1C0A0A;--dk2:#2D1111;--off:#FFF7F7;
  --g1:#F3EDED;--g2:#E5D5D5;--g3:#9CA3AF;
  --gr:#15803D;--gr-b:#DCFCE7;
  --or:#C2410C;--or-b:#FED7AA;
  --bl:#1D4ED8;--bl-b:#DBEAFE;
  --pu:#7C3AED;--pu-b:#EDE9FE;
  --sh:0 4px 20px rgba(185,28,28,.12);
  --sh2:0 12px 40px rgba(185,28,28,.22);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Tajawal',sans-serif;background:var(--off);color:var(--dk);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--pr);border-radius:3px;}

/* ═══════════════════════════════════
   CORE PAGE SYSTEM — FIXED FULLSCREEN
═══════════════════════════════════ */
.page{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  /* Hidden state */
  opacity:0;
  pointer-events:none;
  z-index:1;
  transform:translateX(100vw);
  transition:transform .42s cubic-bezier(.4,0,.2,1), opacity .42s ease;
}
.page.active{
  opacity:1;
  pointer-events:all;
  z-index:10;
  transform:translateX(0);
}
.page.leaving{
  opacity:0;
  pointer-events:none;
  z-index:5;
  transform:translateX(-60px);
  transition:transform .35s ease, opacity .35s ease;
}
#pg-land{transform:translateX(0) !important;opacity:1 !important;pointer-events:all !important;z-index:10 !important;}
#pg-admin{background:#EDE8E8;}

/* ═══════════════════════════════════
   LANDING
═══════════════════════════════════ */
#pg-land{background:var(--dk);display:flex;flex-direction:column;}
.slider{position:absolute;inset:0;z-index:0;overflow:hidden;}
.slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.4s ease;}
.slide.on{opacity:1;}
.slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(28,10,10,.72) 0%,rgba(28,10,10,.42) 40%,rgba(28,10,10,.88) 100%);}
.sl1{background-image:url('https://images.unsplash.com/photo-1615461066841-6116e61058f4?w=1600&q=80');}
.sl2{background-image:url('https://images.unsplash.com/photo-1579154204601-01588f351e67?w=1600&q=80');}
.sl3{background-image:url('https://images.unsplash.com/photo-1584744982491-665216d95f8b?w=1600&q=80');}
.sl4{background-image:url('https://images.unsplash.com/photo-1559757148-5c350d0d3c56?w=1600&q=80');}
.sdots{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:3;}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:.3s;}
.sdot.on{background:var(--ac-l);width:26px;border-radius:4px;}
.lnav{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:20px 32px;}
.logo-w{display:flex;align-items:center;gap:13px;}
.logo-ic{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--pr),var(--pr-d));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 16px rgba(185,28,28,.5);overflow:hidden;flex-shrink:0;}
.logo-ic img{width:100%;height:100%;object-fit:cover;display:none;}
.logo-tx h3{font-family:'Amiri',serif;font-size:18px;color:#fff;line-height:1.2;}
.logo-tx p{font-size:10px;color:var(--ac-l);letter-spacing:2px;text-transform:uppercase;}
.staff-b{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.8);padding:9px 20px;border-radius:9px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;transition:.2s;}
.staff-b:hover{background:rgba(255,255,255,.2);color:#fff;}
.lhero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 60px;position:relative;z-index:2;text-align:center;}
.drop-ic{width:68px;height:82px;margin-bottom:22px;animation:dFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 18px rgba(220,38,38,.75));}
@keyframes dFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-9px) scale(1.06);}}
.ltag{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--ac-l);margin-bottom:10px;animation:fUp .7s ease both;}
.ltitle{font-family:'Amiri',serif;font-size:clamp(26px,5.5vw,52px);color:#fff;line-height:1.15;margin-bottom:8px;text-shadow:0 2px 24px rgba(0,0,0,.6);animation:fUp .7s .12s ease both;}
.ldiv{width:56px;height:2px;background:linear-gradient(90deg,transparent,var(--ac-l),transparent);margin:0 auto 36px;animation:fUp .7s .18s ease both;}
.lsub{font-size:clamp(13px,2.5vw,16px);color:rgba(255,255,255,.58);max-width:480px;margin-bottom:44px;animation:fUp .7s .24s ease both;}
@keyframes fUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.hbtns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:fUp .7s .36s ease both;}
.hb{display:flex;flex-direction:column;align-items:center;gap:7px;padding:22px 36px;border:none;border-radius:17px;cursor:pointer;font-family:'Tajawal',sans-serif;font-weight:700;transition:all .35s cubic-bezier(.34,1.56,.64,1);min-width:175px;}
.hb:hover{transform:translateY(-7px) scale(1.04);}
.hb-r{background:linear-gradient(135deg,var(--pr),var(--pr-d));color:#fff;font-size:18px;box-shadow:0 8px 28px rgba(185,28,28,.55);}
.hb-g{background:linear-gradient(135deg,var(--ac),#92400E);color:#fff;font-size:18px;box-shadow:0 8px 28px rgba(180,83,9,.5);}
.hb-gr{background:linear-gradient(135deg,#059669,#065F46);color:#fff;font-size:18px;box-shadow:0 8px 28px rgba(5,150,105,.5);}
.hbic{font-size:30px;}.hbsb{font-size:10px;opacity:.8;font-weight:400;}
.wbar{position:relative;z-index:2;background:rgba(0,0,0,.45);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08);padding:22px 24px;}
.wbt{text-align:center;color:var(--ac-l);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;}
.wcs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.wc{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:13px 18px;text-align:center;color:#fff;cursor:pointer;transition:.3s;min-width:110px;}
.wc:hover{background:rgba(255,255,255,.18);transform:translateY(-3px);}
.wci{font-size:24px;margin-bottom:5px;}.wcn{font-size:12px;font-weight:700;}.wcs2{font-size:10px;opacity:.5;margin-top:2px;}

/* AI FAB */
.ai-fab{position:fixed;bottom:24px;right:24px;z-index:900;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,#7C3AED);border:none;cursor:pointer;box-shadow:0 8px 28px rgba(79,70,229,.55);display:flex;align-items:center;justify-content:center;font-size:26px;transition:all .3s cubic-bezier(.34,1.56,.64,1);animation:fabP .5s .8s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes fabP{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.ai-fab:hover{transform:scale(1.12);}
.ai-bdg{position:absolute;top:-3px;right:-3px;width:18px;height:18px;background:var(--ac-l);border-radius:50%;font-size:9px;font-weight:800;color:var(--dk);display:flex;align-items:center;justify-content:center;}
.ai-w{position:fixed;bottom:94px;right:24px;z-index:899;width:330px;height:470px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);display:flex;flex-direction:column;transform:scale(0.85) translateY(20px);opacity:0;transform-origin:bottom right;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.ai-w.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
.ai-hd{background:linear-gradient(135deg,#4F46E5,#7C3AED);padding:14px 16px;border-radius:20px 20px 0 0;display:flex;align-items:center;gap:10px;}
.ai-av{width:34px;height:34px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;}
.ai-hd h4{color:#fff;font-size:13px;font-weight:700;}.ai-hd p{color:rgba(255,255,255,.65);font-size:10px;}
.ai-cl{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.7);font-size:19px;cursor:pointer;}
.ai-lgs{display:flex;gap:5px;padding:8px 12px 0;}
.ai-lg{flex:1;padding:5px;border:1.5px solid var(--g2);border-radius:6px;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;background:#fff;cursor:pointer;transition:.2s;}
.ai-lg.on{background:#4F46E5;border-color:#4F46E5;color:#fff;}
.ai-ms{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;}
.ai-m{max-width:82%;padding:9px 12px;border-radius:13px;font-size:12px;line-height:1.5;}
.ai-m.bot{background:var(--g1);color:var(--dk);border-radius:4px 13px 13px 13px;align-self:flex-start;}
.ai-m.usr{background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;border-radius:13px 4px 13px 13px;align-self:flex-end;}
.tdts{display:flex;gap:4px;}
.tdts span{width:6px;height:6px;background:var(--g3);border-radius:50%;animation:td 1.2s infinite;}
.tdts span:nth-child(2){animation-delay:.2s;}.tdts span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
.ai-in{padding:10px;border-top:1px solid var(--g2);display:flex;gap:7px;}
.ai-in input{flex:1;padding:8px 12px;border:1.5px solid var(--g2);border-radius:9px;font-family:'Tajawal',sans-serif;font-size:12px;outline:none;}
.ai-in input:focus{border-color:#4F46E5;}
.ai-sn{width:34px;height:34px;background:linear-gradient(135deg,#4F46E5,#7C3AED);border:none;border-radius:9px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* FORMS */
.fhdr{padding:22px 22px 32px;color:#fff;}
.fhdr.red{background:linear-gradient(135deg,var(--pr-d),var(--pr));}
.fhdr.blue{background:linear-gradient(135deg,#1e3a8a,var(--bl));}
.fhdr.green{background:linear-gradient(135deg,#065F46,#059669);}
.fhdr h2{font-size:22px;font-weight:800;}.fhdr p{font-size:12px;opacity:.8;margin-top:3px;}
.bk{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);color:#fff;padding:7px 15px;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;margin-bottom:13px;display:inline-flex;align-items:center;gap:6px;transition:.2s;}
.bk:hover{background:rgba(255,255,255,.25);}
.fb2{padding:20px 16px;max-width:600px;margin:0 auto;}
.fc{background:#fff;border-radius:14px;padding:20px;box-shadow:var(--sh);margin-bottom:15px;}
.fc h3{font-size:14px;font-weight:800;color:var(--pr);margin-bottom:13px;padding-bottom:9px;border-bottom:2px solid var(--g1);display:flex;align-items:center;gap:7px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.fr.f{grid-template-columns:1fr;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;}
.fg input,.fg select,.fg textarea{padding:10px 12px;border:1.5px solid var(--g2);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--dk);background:#FAFAFA;transition:.2s;outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(185,28,28,.1);background:#fff;}
.bgg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
.bgo{padding:9px 4px;border:2px solid var(--g2);border-radius:9px;text-align:center;cursor:pointer;font-weight:800;font-size:14px;transition:.2s;background:#fff;color:#666;}
.bgo:hover{border-color:var(--pr);color:var(--pr);}
.bgo.sel{background:var(--pr);border-color:var(--pr);color:#fff;}
.rhr{display:flex;gap:9px;}
.rhb{flex:1;padding:9px;border:2px solid var(--g2);border-radius:9px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:800;background:#fff;transition:.2s;}
.rhb.plus.sel{background:var(--gr);border-color:var(--gr);color:#fff;}
.rhb.minus.sel{background:#374151;border-color:#374151;color:#fff;}
.cw{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:5px 12px;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;cursor:pointer;transition:.2s;background:#fff;font-family:'Tajawal',sans-serif;}
.chip.sel{background:var(--pr);border-color:var(--pr);color:#fff;}
.tgr{display:flex;gap:9px;}
.tgb{flex:1;padding:9px;border:2px solid var(--g2);border-radius:9px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;background:#fff;transition:.2s;}
.tgb.yes.sel{background:var(--gr);border-color:var(--gr);color:#fff;}
.tgb.no.sel{background:var(--pr);border-color:var(--pr);color:#fff;}
.sb{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:.3s;margin-top:7px;color:#fff;}
.sb.r{background:linear-gradient(135deg,var(--pr),var(--pr-d));box-shadow:var(--sh2);}
.sb.b{background:linear-gradient(135deg,var(--bl),#1e3a8a);}
.sb.g{background:linear-gradient(135deg,var(--gr),#065F46);}
.sb:hover{transform:translateY(-3px);}

/* SCAN BUTTON */
.scan-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,var(--pu),#6D28D9);color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:13px;width:100%;justify-content:center;}
.scan-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(124,58,237,.4);}
.scan-area{border:2px dashed var(--pu);border-radius:12px;padding:20px;text-align:center;background:#FAFAFA;margin-bottom:13px;display:none;}
.scan-area.show{display:block;}
.scan-area img{max-width:100%;max-height:200px;border-radius:8px;margin-bottom:10px;}
.scan-status{font-size:12px;color:var(--pu);font-weight:700;margin-top:8px;}

/* LOGIN */
#pg-login{background:linear-gradient(135deg,var(--dk),var(--dk2),#3D1212);display:flex;align-items:center;justify-content:center;padding:20px;}
.lbox{background:#fff;border-radius:22px;padding:36px 30px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.45);}
.llogo{text-align:center;margin-bottom:22px;}
.llogo .bd{font-size:48px;animation:dFloat 3s ease-in-out infinite;}
.llogo h2{font-family:'Amiri',serif;font-size:18px;color:var(--pr-d);margin-top:7px;}
.llogo p{font-size:11px;color:var(--g3);margin-top:2px;}
.lbox h3{font-size:16px;font-weight:800;text-align:center;margin-bottom:18px;}
.li{margin-bottom:12px;}
.li label{display:block;font-size:11px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;}
.li input{width:100%;padding:10px 13px;border:1.5px solid var(--g2);border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:.2s;}
.li input:focus{border-color:var(--pr);}
.otn{font-size:11px;color:var(--g3);margin-top:3px;}
.lerr{background:#FEF2F2;border:1px solid #FECACA;color:var(--pr);padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:11px;display:none;}
.lbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--pr),var(--pr-d));color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:.3s;box-shadow:var(--sh);}
.lbtn:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.lbk{text-align:center;margin-top:13px;font-size:12px;color:var(--g3);cursor:pointer;}
.lbk span{color:var(--pr);font-weight:700;}

/* ADMIN */
.sidebar{width:248px;background:linear-gradient(180deg,#1C0A0A,#2D1111);color:#fff;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;display:flex;flex-direction:column;transition:transform .3s;}
.sbb{padding:18px 15px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center;}
.sblo{width:42px;height:42px;border-radius:10px;background:var(--pr);display:flex;align-items:center;justify-content:center;font-size:21px;margin:0 auto 7px;overflow:hidden;}
.sblo img{width:100%;height:100%;object-fit:cover;display:none;}
.sbb h3{font-family:'Amiri',serif;font-size:13px;opacity:.9;line-height:1.3;}
.sbb p{font-size:10px;color:var(--ac-l);margin-top:3px;}
.sbn{padding:11px 9px;flex:1;}
.nvs{font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.28);text-transform:uppercase;padding:10px 9px 4px;}
.nv{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.62);transition:.2s;margin-bottom:1px;}
.nv:hover{background:rgba(255,255,255,.08);color:#fff;}
.nv.on{background:var(--pr);color:#fff;}
.nv .ni{font-size:14px;width:18px;text-align:center;}
.sbf{padding:12px;border-top:1px solid rgba(255,255,255,.1);}
.sbur{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.sbav{width:32px;height:32px;border-radius:50%;background:var(--pr);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.sbun{font-size:12px;font-weight:700;}.sbrl{font-size:10px;color:var(--ac-l);}
.lo{width:100%;padding:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.62);border-radius:7px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;transition:.2s;}
.lo:hover{background:var(--pr);border-color:var(--pr);color:#fff;}
.amain{margin-left:248px;padding:20px;overflow-y:auto;height:100vh;}
.ahdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap;}
.ahdr h1{font-size:21px;font-weight:900;color:var(--dk);}
.ahdr p{font-size:11px;color:var(--g3);margin-top:2px;}
.mtg{display:none;background:var(--pr);color:#fff;border:none;border-radius:7px;padding:7px 11px;font-size:19px;cursor:pointer;}
.sbov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;}
.sbov.on{display:block;}
.panel{display:none;}.panel.on{display:block;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:11px;margin-bottom:20px;}
.sc{background:#fff;border-radius:13px;padding:15px;box-shadow:var(--sh);display:flex;align-items:center;gap:11px;cursor:pointer;transition:.2s;}
.sc:hover{transform:translateY(-3px);}
.si{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.si.r{background:rgba(185,28,28,.1);}.si.b{background:rgba(29,78,216,.1);}.si.g{background:rgba(21,128,61,.1);}
.si.o{background:rgba(194,65,12,.1);}.si.gl{background:rgba(180,83,9,.1);}.si.p{background:rgba(124,58,237,.1);}
.sv{font-size:26px;font-weight:900;color:var(--dk);line-height:1;}.sl2{font-size:11px;color:var(--g3);margin-top:3px;}
.pc{background:#fff;border-radius:15px;padding:19px;box-shadow:var(--sh);margin-bottom:15px;}
.pc h3{font-size:15px;font-weight:800;color:var(--dk);margin-bottom:12px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.fbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px;align-items:center;}
.fb{padding:5px 13px;border:1.5px solid var(--g2);border-radius:20px;background:#fff;font-family:'Tajawal',sans-serif;font-size:11px;cursor:pointer;transition:.2s;font-weight:600;}
.fb.on{background:var(--pr);border-color:var(--pr);color:#fff;}
.fb:hover:not(.on){border-color:var(--pr);color:var(--pr);}
.fsl{padding:5px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:'Tajawal',sans-serif;font-size:11px;background:#fff;outline:none;}
.tw{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{background:var(--g1);padding:8px 10px;text-align:left;font-weight:800;color:#666;font-size:10px;text-transform:uppercase;white-space:nowrap;}
.dt td{padding:10px;border-bottom:1px solid #F0E8E8;vertical-align:middle;}
.dt tr:hover td{background:#FFF8F8;}
.dt tr:last-child td{border-bottom:none;}
